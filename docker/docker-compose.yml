version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: waterportal
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: waterportal
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - '3001:3001'

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - '3000:3000'
